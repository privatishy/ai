# Конфигурация датасета для YOLOv8

# Путь к датасету
path: dataset/

# Разделение данных
train: images/train
val: images/val
test: images/test

# Количество классов (из config.yaml)
nc: 12

# Имена классов (должны совпадать с config.yaml)
